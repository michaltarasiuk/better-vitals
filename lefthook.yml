pre-commit:
  jobs:
    - glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      run: bun x ultracite fix
      stage_fixed: true
    - glob:
        - "**/*.ts"
        - "**/*.tsx"
      run: mise exec -- bun x lintcn lint
